<!DOCTYPE html>
<html>

<head>

    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <span class="navbar-brand">

            🚀 Student Dashboard

        </span>

        <!-- HOME BUTTON -->

        <a href="/"
           class="btn btn-light">

           Home

        </a>

    </div>

</nav>

<div class="container mt-5">

    <!-- DASHBOARD -->

    <div class="dashboard-card">

        <h2>Total Students</h2>

        <h1>{{ total_students }}</h1>

    </div>

    <!-- SEARCH + ADD -->

    <div class="d-flex justify-content-between align-items-center mb-4 gap-3">

        <!-- SEARCH -->

        <form method="GET"
              action="/"
              style="width:70%;"
              class="d-flex gap-2">

            <input type="text"
                   name="search"
                   placeholder="🔍 Search anything..."
                   class="form-control search-box">

            <button class="btn btn-primary">

                Search

            </button>

        </form>

        <!-- ADD BUTTON -->

        <a href="/add"
           class="btn add-btn">

           + Add Student

        </a>

    </div>

    <!-- TABLE -->

    <table class="table table-borderless">

        <thead>

        <tr>

            <th>ID</th>
            <th>Roll No</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Year</th>
            <th>Phone</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[4] }}</td>
            <td>{{ student[5] }}</td>
            <td>{{ student[6] }}</td>

            <td>

                <a href="/edit/{{ student[0] }}"
                   class="btn btn-warning btn-sm">

                   Edit

                </a>

                <a href="/delete/{{ student[0] }}"
                   class="btn btn-danger btn-sm">

                   Delete

                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
