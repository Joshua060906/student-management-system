<!DOCTYPE html>
<html>

<head>

    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="form-card">

        <h2 class="mb-4">
            Add Student
        </h2>

        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            <input type="text"
                   name="roll_number"
                   placeholder="Roll Number"
                   class="form-control"
                   required>

            <input type="text"
                   name="name"
                   placeholder="Student Name"
                   class="form-control"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   class="form-control"
                   required>

            <input type="text"
                   name="course"
                   placeholder="Course"
                   class="form-control"
                   required>

            <select name="year"
                    class="form-select"
                    required>

                <option value="">
                    Select Year
                </option>

                <option>
                    1st Year
                </option>

                <option>
                    2nd Year
                </option>

                <option>
                    3rd Year
                </option>

                <option>
                    4th Year
                </option>

            </select>

            <input type="text"
                   name="phone"
                   placeholder="Phone Number"
                   class="form-control"
                   required>

            <button class="btn btn-success w-100 mt-3">

                Save Student

            </button>

        </form>

    </div>

</div>

</body>

</html>
