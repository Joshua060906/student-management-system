<!DOCTYPE html>
<html>

<head>

    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="form-card">

        <h2>Edit Student</h2>

        <form method="POST">

            <input type="text"
                   name="roll_number"
                   value="{{ student[1] }}"
                   class="form-control mb-3"
                   required>

            <input type="text"
                   name="name"
                   value="{{ student[2] }}"
                   class="form-control mb-3"
                   required>

            <input type="email"
                   name="email"
                   value="{{ student[3] }}"
                   class="form-control mb-3"
                   required>

            <input type="text"
                   name="course"
                   value="{{ student[4] }}"
                   class="form-control mb-3"
                   required>

            <input type="text"
                   name="year"
                   value="{{ student[5] }}"
                   class="form-control mb-3"
                   required>

            <input type="text"
                   name="phone"
                   value="{{ student[6] }}"
                   class="form-control mb-3"
                   required>

            <button class="btn btn-primary w-100">

                Update Student

            </button>

        </form>

    </div>

</div>

</body>

</html>
